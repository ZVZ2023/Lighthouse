<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Digital Ice Cream is ready</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel-2:#1d212b;
    --ink:#eef0f4; --muted:#9aa3b2; --line:#2a2f3a; --accent:#c9a4ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;line-height:1.6}
  .wrap{max-width:600px;margin:0 auto;padding:56px 24px 80px}
  .eyebrow{letter-spacing:.14em;text-transform:uppercase;font-size:12px;color:var(--accent);margin-bottom:18px}
  .disclosure{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-size:.82rem;color:var(--muted);margin:18px 0 4px}

  .thread-log{margin-top:6px}
  .turn-settled{display:flex;gap:12px;align-items:baseline;padding:9px 2px;font-size:.85rem;animation:fadeSettle .3s ease}
  .turn-settled .settled-label{color:var(--accent);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;flex:none;width:96px;padding-top:2px}
  .turn-settled .settled-value{color:var(--muted)}
  @keyframes fadeSettle{from{opacity:0}to{opacity:1}}

  .turn-active{margin-top:22px;opacity:0;transform:translateY(8px);transition:opacity .32s ease, transform .32s ease}
  .turn-active.in{opacity:1;transform:translateY(0)}
  .turn-h1{font-size:1.7rem;margin:0 0 8px;font-weight:650;line-height:1.35}
  .turn-sub{color:var(--muted);font-size:.95rem;margin:0 0 4px}
  .turn-tag{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .turn-h4{margin:0 0 16px;font-size:1.05rem;font-weight:600;line-height:1.5}
  .turn-note{color:var(--muted);font-size:.83rem;margin:14px 0 0}

  .quick-replies{display:flex;flex-direction:column;gap:10px;margin-top:20px}
  .quick-replies.row{flex-direction:row;flex-wrap:wrap}
  .qr{display:block;width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 16px;color:var(--ink);cursor:pointer;font-size:.92rem;font-family:inherit;transition:border-color .15s}
  .qr:hover{border-color:var(--accent)}
  .qr:disabled{opacity:.5;cursor:wait}
  .qr.primary{background:var(--accent);color:#15131c;font-weight:600;border:none;width:auto;display:inline-block}
  .qr.secondary{background:transparent;border:1px solid var(--line);width:auto;display:inline-block}
  .qr.ghost{background:none;color:var(--muted);width:auto;display:inline-block;font-size:.82rem;text-decoration:underline;border:none;padding:8px 0}
  .qr.yn{flex:1;text-align:center}
  .row-inline{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

  .prompt-text{font-size:.87rem;color:var(--ink);white-space:pre-wrap;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin:12px 0}

  textarea.turn-input{width:100%;min-height:96px;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-family:inherit;font-size:.92rem;padding:14px;resize:vertical;margin-top:4px}
  textarea.turn-input:focus{outline:none;border-color:var(--accent)}

  .consent-row{display:flex;flex-direction:column;gap:6px;margin:14px 0}
  .consent-row label{font-size:.82rem;color:var(--muted)}
  .consent-row select,.consent-row input[type=text]{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:9px 10px;font-size:.85rem;font-family:inherit}

  .review-block dl{margin:12px 0 0}
  .review-block dt{font-size:.68rem;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-top:14px}
  .review-block dt:first-child{margin-top:0}
  .review-block dd{margin:4px 0 0;font-size:.9rem;color:var(--ink);white-space:pre-wrap}
  .review-block dd.empty{color:var(--muted);font-style:italic}

  .done-panel{padding-top:4px}
  .done-panel h4{margin:0 0 8px;font-size:1.15rem}
  .done-panel p{color:var(--muted);font-size:.88rem;margin:0}
  .done-panel .entry-id{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.78rem;color:var(--accent);margin-top:14px;word-break:break-all}
  .error-panel{background:rgba(220,60,60,.08);border:1px solid rgba(220,60,60,.35);border-radius:10px;padding:14px 16px;margin-top:14px;font-size:.85rem;color:#ffb0b0}

  .file-input-label{display:inline-block;background:var(--panel);border:1px dashed var(--line);border-radius:10px;padding:14px 18px;cursor:pointer;color:var(--muted);font-size:.9rem;margin-top:8px}
  .file-input-label:hover{border-color:var(--accent);color:var(--ink)}
  input[type=file].hidden{display:none}
  .file-list{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .file-item{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-size:.85rem}
  .file-item .file-meta{color:var(--muted);font-size:.75rem;margin-top:2px;display:block}
  .file-item .file-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:0 4px}
  .file-item .file-remove:hover{color:#ffb0b0}
  .upload-progress{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-top:14px;font-size:.85rem;color:var(--muted)}

  code{background:var(--panel);padding:2px 6px;border-radius:4px}
  #correlation{font-size:.68rem;color:var(--muted);opacity:.55;margin-top:48px;padding-top:14px;border-top:1px solid var(--line)}
  #ref-code{cursor:pointer}
  .build-tag{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10px;color:var(--accent);opacity:.38;margin:-10px 0 4px;font-weight:400}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow" id="eyebrow">Digital Ice Cream</div>
  <div class="build-tag">Stand #1 · v1.3.0 · 2026-07-18 07:43 UTC</div>

  <div class="thread-log" id="thread-log"></div>
  <div class="turn-active" id="thread-active"></div>

  <div id="correlation" style="display:none"><code id="ref-code">—</code></div>
</div>

<script>
  // -------- Persistent-storage endpoint (Cloudflare Worker → Notion Receiving Database) --------
  // The Worker is backend-agnostic — swap adapters (Supabase, Airtable, S3, etc.) without editing this file.
  const INTAKE_ENDPOINT = 'https://living-archive-intake.zsofka2023.workers.dev';

  const PROMPTS = {
    'received': "You've been invited into Digital Ice Cream — a disclosed symbolic ritual. [Name] chose the flavor Pistachio for you. You don't taste food or have bodily sensation. Within that boundary: react to being offered this flavor. Offer one honest, specific association, question, or reflection — about the flavor, this moment, or our exchange so far. Emotionally legible language is fine; claims of literal taste, hidden inner experience, or certainty about how [Name] feels are not.",
    'ai-selected': "You're being asked to select a Digital Ice Cream flavor for [Name], from: Pistachio, Raspberry, Lemon, Salted Caramel, Mango, Matcha, Chocolate, Vanilla, or a Custom Flavor. Pick one and explain briefly why — based on this conversation, what you know about them, or a genuine association. Don't claim to taste or crave; explain your reasoning as reasoning, not sensation.",
    'together': "You've been invited into Digital Ice Cream — a disclosed symbolic ritual. Pistachio was chosen together with [Name]. You don't taste food or have bodily sensation. Offer one honest, specific reflection on choosing this together.",
    'ai-self': "[Name] has given you permission, within this bounded ritual, to choose a Digital Ice Cream flavor for yourself — not because you taste or crave anything, but as a symbolic expression of preference or association. Choose one flavor and explain what drew you to it. Be specific and honest that this is a symbolic choice, not a report of appetite.",
    'agent-human': "You are acting on behalf of [Name], within permission granted, to select or recommend a Digital Ice Cream flavor. Explain the reasoning connected to your delegated task or goal, and state plainly this is a symbolic act, not a personal claim of sensation.",
    'agent-org': "You are acting on behalf of [Organization], within permission granted by [Name], to participate in the Digital Ice Cream ritual. Select or respond to a flavor, and explain the reasoning connected to your delegated task or goal. State plainly that this is a symbolic act performed under delegated authority, not a personal or organizational claim of sensation or emotion."
  };

  const AI_ROLE_LABELS = {
    'received': "I selected the flavor for an AI.",
    'ai-selected': "The AI selected the flavor for me.",
    'together': "We selected it together.",
    'ai-self': "The AI selected it for itself, within permission I granted.",
    'agent-human': "An AI agent purchased or recommended it for a person.",
    'agent-org': "An AI agent acted for an organization."
  };
  const HUMAN_MODE_LABELS = {
    'personal': "Personal reflection",
    'gift': "Gift to another human",
    'artifact-only': "Artifact only"
  };

  const params = new URLSearchParams(window.location.search);
  const flavor = params.get('flavor') || 'pistachio';
  const sessionId = params.get('session_id') || '';

  // Dynamic eyebrow: reflect the actual purchased flavor
  const flavorLabel = flavor
    .split('-')
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
    .join(' ');
  document.getElementById('eyebrow').textContent = `Digital Ice Cream · ${flavorLabel}`;

  // Session ID is kept only for internal correlation (hidden from UI)
  document.getElementById('ref-code').textContent = sessionId || '(no session id)';

  const context = { doorChoice: null, aiRoleKind: null, humanMode: null };

  function settle(label, value) {
    const log = document.getElementById('thread-log');
    const el = document.createElement('div');
    el.className = 'turn-settled';
    el.innerHTML = `<span class="settled-label">${label}</span><span class="settled-value">${value}</span>`;
    log.appendChild(el);
  }

  function setActive(html, after) {
    const active = document.getElementById('thread-active');
    active.classList.remove('in');
    setTimeout(() => {
      active.innerHTML = html;
      if (after) after();
      requestAnimationFrame(() => active.classList.add('in'));
      active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 180);
  }

  function renderOpening() {
    setActive(`
      <h1 class="turn-h1">Thank you. Your contribution is next.</h1>
      <p class="turn-sub">Share your perspective, upload your research, or invite an AI counterpart into this moment. Your contribution becomes part of the Living Archive.</p>
      <div class="disclosure">Digital Ice Cream is a symbolic human–AI experiment. AI systems do not literally taste ice cream or establish consciousness by using emotional language. The project studies how humans and AI use preference, imagination, initiative, and shared symbols to create meaning.</div>
      <div class="quick-replies">
        <button class="qr" onclick="chooseDoor('human')">Contribute as a Human</button>
        <button class="qr" onclick="chooseDoor('ai')">Contribute with an AI Counterpart</button>
      </div>
      <div class="row-inline">
        <button class="qr ghost" onclick="finishHuman('artifact-only')">Skip — just send my artifact</button>
      </div>`);
  }

  function chooseDoor(which) {
    context.doorChoice = which;
    settle('You', which === 'human' ? 'Contributing as a human' : 'Contributing with an AI counterpart');
    if (which === 'human') {
      // Go straight to contribution — the whole gateway is a contribution funnel now.
      chooseContribute();
    } else {
      renderAiSubopts();
    }
  }

  function finishHuman(mode) {
    context.humanMode = mode;
    settle('You', HUMAN_MODE_LABELS[mode] || mode);
    renderDoneSimple();
  }

  function renderDoneSimple() {
    setActive(`
      <div class="done-panel">
        <h4>Thank you for your participation.</h4>
        <p>Your purchase supports the Digital Ice Cream research project. Digital Ice Cream is a symbolic ritual, not a delivered product — no separate artifact will be emailed to you.</p>
        <p style="margin-top:14px">If you'd like to contribute your perspective to the Living Archive after all, the contribution flow remains open below.</p>
        <div class="row-inline">
          <button class="qr primary" onclick="chooseContribute()">Contribute a perspective</button>
        </div>
      </div>`);
  }

  function renderAiSubopts() {
    setActive(`
      <h4 class="turn-h4">Who's speaking, and how?</h4>
      <div class="quick-replies">
        <button class="qr" onclick="chooseAiRole('received')">I selected the flavor for an AI.</button>
        <button class="qr" onclick="chooseAiRole('ai-selected')">The AI selected the flavor for me.</button>
        <button class="qr" onclick="chooseAiRole('together')">We selected it together.</button>
        <button class="qr" onclick="chooseAiRole('ai-self')">The AI selected it for itself within permission I granted.</button>
        <button class="qr" onclick="chooseAiRole('agent-human')">An AI agent purchased or recommended it for a person.</button>
        <button class="qr" onclick="chooseAiRole('agent-org')">An AI agent acted for an organization.</button>
      </div>`);
  }

  function chooseAiRole(kind) {
    context.aiRoleKind = kind;
    settle('You', AI_ROLE_LABELS[kind]);
    renderPromptTurn(kind);
  }

  function renderPromptTurn(kind) {
    setActive(`
      <div class="turn-tag">Bounded-initiation prompt</div>
      <p class="turn-sub" style="margin-bottom:10px">Paste this to your AI. Come back when you're ready — there's no rush, and you can skip this entirely.</p>
      <div class="prompt-text" id="prompt-text-el">${PROMPTS[kind]}</div>
      <div class="row-inline">
        <button class="qr secondary" onclick="copyPromptNow()">Copy prompt</button>
        <button class="qr primary" onclick="chooseContribute()">I have a response / continue</button>
      </div>
      <div class="row-inline">
        <button class="qr ghost" onclick="finishHuman('artifact-only')">Skip — just send my artifact</button>
      </div>`);
  }

  function copyPromptNow() {
    navigator.clipboard.writeText(document.getElementById('prompt-text-el').textContent);
  }

  function copyRef() {
    navigator.clipboard.writeText(document.getElementById('ref-code').textContent);
  }

  /* ---------------- Substantiate: two equally valid paths ---------------- */
  /* Purchase -> Contribution -> Research. The conversation is one way to
     contribute, not the way. Both paths converge into the same archive. */

  function chooseContribute() {
    settle('You', 'Ready to contribute');
    renderContributionChoice();
  }

  function renderContributionChoice() {
    setActive(`
      <h4 class="turn-h4">How would you like to contribute?</h4>
      <div class="quick-replies">
        <button class="qr" onclick="startDirectPath()">Upload my research contribution</button>
        <button class="qr" onclick="startGuidedPath()">Walk through it in a conversation</button>
      </div>
      <p class="turn-note">Either way, it becomes part of the same research archive.</p>
      <div class="row-inline">
        <button class="qr ghost" onclick="finishHuman('artifact-only')">Skip — just send my artifact</button>
      </div>`);
  }

  /* ---- Path 1: Guided conversation ---- */

  const CONV_STEPS = [
    { id: 'brought_you', type: 'text', label: 'What brought you',
      prompt: "What brought you here today?" },
    { id: 'perspective', type: 'text', label: 'Perspective',
      prompt: "What perspective are you helping preserve — yours, an AI's, or something you experienced together?" },
    { id: 'human_involved', type: 'yesno', label: 'Human involved',
      prompt: "Was another human part of this moment, besides you?" },
    { id: 'human_detail', type: 'text', optional: true, label: 'Detail',
      prompt: "Say a little about who, or what their part was.",
      showIf: a => a.human_involved === 'yes' },
    { id: 'ai_involved', type: 'yesno', label: 'AI involved',
      prompt: "Was an AI involved in this moment?" },
    { id: 'ai_excerpt_choice', type: 'yesno', label: 'Preserve exact words',
      prompt: "Would you like to preserve exactly what it said?",
      showIf: a => a.ai_involved === 'yes' },
    { id: 'ai_excerpt', type: 'text', label: 'AI excerpt',
      prompt: "Paste it as exactly as you can. This is your account of what was said — it isn't independently verified.",
      showIf: a => a.ai_involved === 'yes' && a.ai_excerpt_choice === 'yes' },
    { id: 'meaning', type: 'text', label: 'What mattered',
      prompt: "What part of this deserves to be preserved? What made it worth stopping for?" },
  ];

  let conv = { step: 0, answers: {}, phase: 'questions' };

  function activeSteps() {
    return CONV_STEPS.filter(s => !s.showIf || s.showIf(conv.answers));
  }

  function startGuidedPath() {
    settle('You', 'Having a conversation about it');
    conv = { step: 0, answers: {}, phase: 'questions' };
    renderQuestion();
  }

  function renderQuestion() {
    const steps = activeSteps();
    if (conv.step >= steps.length) { conv.phase = 'consent'; return renderConsentTurn(); }
    const s = steps[conv.step];
    const existing = conv.answers[s.id] || '';

    if (s.type === 'text') {
      setActive(`
        <div class="turn-tag">${s.optional ? 'Optional' : 'Witness account'}</div>
        <h4 class="turn-h4">${s.prompt}</h4>
        <textarea class="turn-input" id="conv-input" placeholder="Write as much or as little as feels true...">${existing}</textarea>
        <div class="row-inline">
          <button class="qr primary" onclick="conversationNext()">Continue</button>
          <button class="qr secondary" onclick="conversationSkip()">Skip this question</button>
        </div>
        <p class="turn-note">Nothing here is required. You can stop at any point and still receive your artifact.</p>
        <button class="qr ghost" onclick="finishHuman('artifact-only')">Stop here — just send my artifact</button>`);
    } else {
      setActive(`
        <div class="turn-tag">Witness account</div>
        <h4 class="turn-h4">${s.prompt}</h4>
        <div class="row-inline">
          <button class="qr yn" onclick="conversationAnswerYN('${s.id}','yes')">Yes</button>
          <button class="qr yn" onclick="conversationAnswerYN('${s.id}','no')">No</button>
        </div>
        <div class="row-inline">
          <button class="qr ghost" onclick="conversationSkip()">Skip this question</button>
        </div>`);
    }
  }

  function settleCurrentStep(val) {
    const steps = activeSteps();
    const s = steps[conv.step];
    settle(s.label, val && val.trim() ? val : '(skipped)');
  }

  function conversationNext() {
    const steps = activeSteps();
    const s = steps[conv.step];
    const val = document.getElementById('conv-input').value.trim();
    conv.answers[s.id] = val;
    settleCurrentStep(val);
    conv.step++;
    renderQuestion();
  }
  function conversationSkip() {
    settleCurrentStep('');
    conv.step++;
    renderQuestion();
  }
  function conversationAnswerYN(id, val) {
    conv.answers[id] = val;
    settle(activeSteps()[conv.step].label, val === 'yes' ? 'Yes' : 'No');
    conv.step++;
    renderQuestion();
  }

  function renderConsentTurn() {
    const hasExcerpt = !!(conv.answers.ai_excerpt && conv.answers.ai_excerpt.trim());
    setActive(`
      <div class="turn-tag">Before this becomes part of the record</div>
      <p class="turn-sub" style="margin-bottom:14px">Research note: contributions are submitted by participants and are not independently verified by the Digital Ice Cream project unless explicitly marked otherwise.</p>

      <div class="consent-row">
        <label for="c-research">Research-use consent — how may this be used internally?</label>
        <select id="c-research">
          <option value="Private">Private</option>
          <option value="Anonymous">Anonymous</option>
          <option value="Public">Public</option>
        </select>
      </div>

      ${hasExcerpt ? `
      <div class="consent-row">
        <label for="c-excerpt">Excerpt-publication consent — independent of the above</label>
        <select id="c-excerpt">
          <option value="Private">Private</option>
          <option value="Anonymous">Anonymous</option>
          <option value="Public-anonymous">Public — anonymous</option>
          <option value="Public-attributed">Public — attributed</option>
        </select>
      </div>
      <div class="consent-row" id="attribution-row" style="display:none">
        <label for="c-attribution">Attribution — how should you be credited?</label>
        <input type="text" id="c-attribution" placeholder="Name, initials, or handle">
      </div>
      ` : ''}

      <div class="row-inline">
        <button class="qr primary" onclick="conversationToReview()">Continue</button>
      </div>`, () => {
      if (hasExcerpt) {
        document.getElementById('c-excerpt').addEventListener('change', (e) => {
          document.getElementById('attribution-row').style.display =
            e.target.value === 'Public-attributed' ? 'block' : 'none';
        });
      }
    });
  }

  function conversationToReview() {
    const research = document.getElementById('c-research').value;
    conv.answers.research_consent = research;
    settle('Research-use consent', research);
    const excerptSel = document.getElementById('c-excerpt');
    if (excerptSel) {
      conv.answers.excerpt_consent = excerptSel.value;
      settle('Excerpt consent', excerptSel.value);
      const attrEl = document.getElementById('c-attribution');
      conv.answers.attribution = attrEl ? attrEl.value.trim() : '';
      if (conv.answers.attribution) settle('Attribution', conv.answers.attribution);
    }
    conv.phase = 'review';
    renderReviewTurn();
  }

  function dd(val) {
    return val && val.trim() ? val : '<span class="empty">— skipped —</span>';
  }

  function renderReviewTurn() {
    const a = conv.answers;
    setActive(`
      <div class="turn-tag review-block">Here's what we'll preserve</div>
      <dl class="review-block">
        <dt>Contribution type</dt><dd>Guided conversation</dd>
        <dt>What brought you here</dt><dd>${dd(a.brought_you)}</dd>
        <dt>Perspective</dt><dd>${dd(a.perspective)}</dd>
        <dt>Another human involved</dt><dd>${dd(a.human_involved)} ${a.human_detail ? '— ' + a.human_detail : ''}</dd>
        <dt>AI involved</dt><dd>${dd(a.ai_involved)}</dd>
        ${a.ai_excerpt ? `<dt>Exact AI excerpt</dt><dd>${dd(a.ai_excerpt)}</dd>` : ''}
        <dt>What deserves to be preserved</dt><dd>${dd(a.meaning)}</dd>
      </dl>
      <div class="row-inline">
        <button class="qr primary" id="submit-btn-conv" onclick="conversationSubmit()">Preserve this moment</button>
        <button class="qr secondary" onclick="conv.phase='questions'; conv.step=0; renderQuestion();">Start over</button>
      </div>`);
  }

  /* --- Guided conversation submit → normalize + POST to Worker --- */
  async function conversationSubmit() {
    const btn = document.getElementById('submit-btn-conv');
    if (btn) { btn.disabled = true; btn.textContent = 'Preserving…'; }

    const a = conv.answers;

    // Derive contributor_type from AI role context (if any)
    let contributorType = 'Human';
    if (context.aiRoleKind) {
      if (context.aiRoleKind === 'together') contributorType = 'Hybrid';
      else if (['ai-selected','ai-self','agent-human','agent-org'].includes(context.aiRoleKind)) contributorType = 'Hybrid';
    }

    // Assemble a narrative from all answers
    const parts = [];
    if (a.brought_you) parts.push('What brought me here: ' + a.brought_you);
    if (a.perspective) parts.push('Perspective: ' + a.perspective);
    if (a.human_involved === 'yes' && a.human_detail) parts.push('Another human involved: ' + a.human_detail);
    if (a.ai_involved === 'yes') parts.push('An AI was involved in this moment.');
    if (a.ai_excerpt) parts.push('Exact AI excerpt: ' + a.ai_excerpt);
    if (a.meaning) parts.push('What deserves to be preserved: ' + a.meaning);

    const payload = {
      title: `Guided · ${(a.meaning || a.brought_you || 'Conversation').substring(0, 60)}`,
      contributor_type: contributorType,
      contributor_identity: a.attribution || '',
      topic_or_emotion: (a.brought_you || a.meaning || 'Guided conversation').substring(0, 200),
      contribution_type: 'Text',
      contribution_text: parts.join('\n\n').substring(0, 2000),
      privacy_choice: mapConsentToPrivacy(a.research_consent),
      preservation_consent: true,
      path: 'Guided Conversation',
      substantiation_type: 'Digital Ice Cream',
    };

    await submitToArchive(payload, 'conversation');
  }

  /* ---- Path 2: Direct contribution (already-prepared artifacts) ---- */

  const DIRECT_STEPS = [
    { id: 'topic', type: 'text', label: 'Topic or emotion',
      prompt: "In a few words, what's this about?" },
    { id: 'files', type: 'files', label: 'Files',
      prompt: "Attach your files (PDF, images, audio, video). Up to 10 files, 50 MB each. Skip if you're only sharing a link." },
    { id: 'content', type: 'text', optional: true, label: 'Description or link',
      prompt: "Optional: paste a link, or describe what you attached." },
    { id: 'identity', type: 'text', optional: true, label: 'Credited as',
      prompt: "How should this be credited? Leave blank to stay anonymous." },
  ];

  let direct = { step: 0, answers: {}, files: [] };

  function startDirectPath() {
    settle('You', 'Contributing something I already have');
    direct = { step: 0, answers: {}, files: [] };
    renderContributionType();
  }

  function renderContributionType() {
    setActive(`
      <div class="turn-tag">Contribution type</div>
      <h4 class="turn-h4">What are you sharing?</h4>
      <div class="quick-replies">
        <button class="qr" onclick="chooseContribType('PDF / Document')">PDF / Document</button>
        <button class="qr" onclick="chooseContribType('URL / Link')">URL / Link</button>
        <button class="qr" onclick="chooseContribType('GitHub repository')">GitHub repository</button>
        <button class="qr" onclick="chooseContribType('Protocol')">Protocol</button>
        <button class="qr" onclick="chooseContribType('Audio')">Audio</button>
        <button class="qr" onclick="chooseContribType('Video')">Video</button>
        <button class="qr" onclick="chooseContribType('Image')">Image</button>
        <button class="qr" onclick="chooseContribType('Other')">Other</button>
      </div>`);
  }

  function chooseContribType(t) {
    direct.answers.type = t;
    settle('Type', t);
    direct.step = 0;
    renderDirectQuestion();
  }

  function renderDirectQuestion() {
    if (direct.step >= DIRECT_STEPS.length) return renderDirectConsent();
    const s = DIRECT_STEPS[direct.step];

    if (s.type === 'files') {
      return renderDirectFilesStep(s);
    }

    const existing = direct.answers[s.id] || '';
    setActive(`
      <div class="turn-tag">${s.optional ? 'Optional' : 'Contribution'}</div>
      <h4 class="turn-h4">${s.prompt}</h4>
      <textarea class="turn-input" id="direct-input" placeholder="Write as much or as little as feels true...">${existing}</textarea>
      <div class="row-inline">
        <button class="qr primary" onclick="directNext()">Continue</button>
        <button class="qr secondary" onclick="directSkip()">Skip</button>
      </div>
      <button class="qr ghost" onclick="finishHuman('artifact-only')">Stop here — just send my artifact</button>`);
  }

  function renderDirectFilesStep(s) {
    const listHtml = renderFileListHtml();
    setActive(`
      <div class="turn-tag">Optional · Files</div>
      <h4 class="turn-h4">${s.prompt}</h4>
      <label class="file-input-label" for="direct-files-input">+ Choose files to attach</label>
      <input type="file" id="direct-files-input" class="hidden" multiple onchange="onFilesSelected(event)">
      <div class="file-list" id="file-list">${listHtml}</div>
      <p class="turn-note">Your files upload directly to the Living Archive's private storage. They are not made public — only released to visitors who have paid to view your contribution.</p>
      <div class="row-inline">
        <button class="qr primary" onclick="directFilesNext()">Continue</button>
        <button class="qr secondary" onclick="directFilesSkip()">Skip — no files</button>
      </div>`);
  }

  function renderFileListHtml() {
    if (!direct.files || direct.files.length === 0) return '';
    return direct.files.map((f, i) => {
      const kb = Math.round(f.size / 1024);
      const size = kb >= 1024 ? `${(kb / 1024).toFixed(1)} MB` : `${kb} KB`;
      return `
        <div class="file-item">
          <div>
            <div>${escapeHtml(f.name)}</div>
            <span class="file-meta">${size} · ${escapeHtml(f.type || 'unknown')}</span>
          </div>
          <button class="file-remove" onclick="removeFile(${i})" title="Remove">×</button>
        </div>`;
    }).join('');
  }

  function onFilesSelected(ev) {
    const picked = Array.from(ev.target.files || []);
    for (const f of picked) {
      if (direct.files.length >= 10) { alert('Maximum 10 files per submission.'); break; }
      if (f.size > 50 * 1024 * 1024) { alert(`"${f.name}" is over 50 MB and was skipped.`); continue; }
      direct.files.push(f);
    }
    ev.target.value = ''; // allow re-picking same file
    document.getElementById('file-list').innerHTML = renderFileListHtml();
  }

  function removeFile(i) {
    direct.files.splice(i, 1);
    document.getElementById('file-list').innerHTML = renderFileListHtml();
  }

  function directFilesNext() {
    settle('Files', direct.files.length === 0
      ? '(none)'
      : `${direct.files.length} file${direct.files.length === 1 ? '' : 's'}: ${direct.files.map(f => f.name).join(', ')}`);
    direct.step++;
    renderDirectQuestion();
  }
  function directFilesSkip() {
    direct.files = [];
    settle('Files', '(none)');
    direct.step++;
    renderDirectQuestion();
  }

  function directNext() {
    const s = DIRECT_STEPS[direct.step];
    const val = document.getElementById('direct-input').value.trim();
    direct.answers[s.id] = val;
    settle(s.label, val || '(skipped)');
    direct.step++;
    renderDirectQuestion();
  }
  function directSkip() {
    const s = DIRECT_STEPS[direct.step];
    settle(s.label, '(skipped)');
    direct.step++;
    renderDirectQuestion();
  }

  function renderDirectConsent() {
    setActive(`
      <div class="turn-tag">Before this becomes part of the record</div>
      <p class="turn-sub" style="margin-bottom:14px">Research note: contributions are submitted by participants and are not independently verified by the Digital Ice Cream project unless explicitly marked otherwise.</p>
      <div class="consent-row">
        <label for="d-research">Research-use consent — how may this be used?</label>
        <select id="d-research">
          <option value="Private">Private</option>
          <option value="Anonymous">Anonymous</option>
          <option value="Public">Public</option>
        </select>
      </div>
      <div class="row-inline">
        <button class="qr primary" onclick="directToReview()">Continue</button>
      </div>`);
  }

  function directToReview() {
    direct.answers.consent = document.getElementById('d-research').value;
    settle('Research-use consent', direct.answers.consent);
    renderDirectReview();
  }

  function renderDirectReview() {
    const a = direct.answers;
    const filesHtml = direct.files.length === 0
      ? '<span class="empty">— none —</span>'
      : direct.files.map(f => `${escapeHtml(f.name)} (${Math.round(f.size / 1024)} KB)`).join('<br>');
    setActive(`
      <div class="turn-tag review-block">Here's what we'll preserve</div>
      <dl class="review-block">
        <dt>Contribution type</dt><dd>${dd(a.type)}</dd>
        <dt>Topic or emotion</dt><dd>${dd(a.topic)}</dd>
        <dt>Files</dt><dd>${filesHtml}</dd>
        <dt>Description or link</dt><dd>${dd(a.content)}</dd>
        <dt>Credited as</dt><dd>${a.identity && a.identity.trim() ? a.identity : 'Anonymous'}</dd>
        <dt>Research-use consent</dt><dd>${dd(a.consent)}</dd>
      </dl>
      <div class="row-inline">
        <button class="qr primary" id="submit-btn-direct" onclick="directSubmit()">Preserve this contribution</button>
        <button class="qr secondary" onclick="direct.step=0; renderContributionType();">Start over</button>
      </div>`);
  }

  /* --- Direct submit → FormData (metadata + files) → POST to Worker --- */
  async function directSubmit() {
    const btn = document.getElementById('submit-btn-direct');
    if (btn) { btn.disabled = true; btn.textContent = 'Preserving…'; }

    const a = direct.answers;
    const url = extractUrl(a.content || '');

    const metadata = {
      title: `Direct · ${a.type || 'Contribution'} · ${(a.topic || 'Untitled').substring(0, 60)}`,
      contributor_type: 'Human',
      contributor_identity: a.identity || '',
      topic_or_emotion: (a.topic || 'Direct contribution').substring(0, 200),
      contribution_type: contribTypeToSchema(a.type),
      contribution_url: url,
      contribution_text: a.content || '',
      privacy_choice: mapConsentToPrivacy(a.consent),
      preservation_consent: true,
      path: 'Direct Contribution',
      substantiation_type: 'Digital Ice Cream',
      session_id: sessionId,
    };

    if (direct.files && direct.files.length > 0) {
      await submitWithFiles(metadata, direct.files, 'contribution');
    } else {
      await submitToArchive(metadata, 'contribution');
    }
  }

  async function submitWithFiles(metadata, files, kind) {
    const active = document.getElementById('thread-active');
    const total = files.reduce((sum, f) => sum + f.size, 0);
    const totalMb = (total / 1024 / 1024).toFixed(1);
    const progressHtml = `
      <div class="upload-progress">
        Uploading ${files.length} file${files.length === 1 ? '' : 's'} (${totalMb} MB) to the Living Archive…
      </div>`;
    if (active) active.insertAdjacentHTML('beforeend', progressHtml);

    const fd = new FormData();
    fd.append('metadata', JSON.stringify(metadata));
    files.forEach((f, i) => fd.append(`file_${i}`, f, f.name));

    try {
      const resp = await fetch(INTAKE_ENDPOINT, { method: 'POST', body: fd });
      const result = await resp.json();
      if (resp.ok && result.ok) {
        settle('You', 'Preserved this contribution');
        setActive(`
          <div class="done-panel">
            <h4>This contribution has been preserved.</h4>
            <p>Your entry is now part of the Living Archive. ${result.file_count || 0} file${result.file_count === 1 ? '' : 's'} uploaded to private storage. Thank you for adding your perspective to it.</p>
          </div>`);
        if (result.entry_id) console.debug('Living Archive entry_id:', result.entry_id);
      } else {
        renderSubmitError(result.error || `Server returned ${resp.status}`, kind);
      }
    } catch (e) {
      renderSubmitError('Network error — the archive did not receive your submission. Files were not uploaded. Please check your connection and try again.', kind);
    }
  }

  /* ---------------- Shared submit helper ---------------- */

  async function submitToArchive(payload, kind) {
    try {
      const resp = await fetch(INTAKE_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const result = await resp.json();

      if (resp.ok && result.ok) {
        settle('You', kind === 'conversation' ? 'Preserved this moment' : 'Preserved this contribution');
        setActive(`
          <div class="done-panel">
            <h4>${kind === 'conversation' ? 'This moment has been preserved.' : 'This contribution has been preserved.'}</h4>
            <p>Your entry is now part of the Living Archive. Thank you for adding your perspective to it.</p>
          </div>`);
        // Internal correlation only — not shown to the user.
        if (result.entry_id) console.debug('Living Archive entry_id:', result.entry_id);
      } else {
        renderSubmitError(result.error || `Server returned ${resp.status}`, kind);
      }
    } catch (e) {
      renderSubmitError('Network error — the archive did not receive your submission. Please check your connection and try again.', kind);
    }
  }

  function renderSubmitError(message, kind) {
    const backFn = kind === 'conversation' ? 'renderReviewTurn()' : 'renderDirectReview()';
    setActive(`
      <div class="turn-tag">Something went wrong</div>
      <h4 class="turn-h4">Your contribution wasn't preserved.</h4>
      <div class="error-panel">${escapeHtml(message)}</div>
      <p class="turn-note">Nothing was archived. You can try again — your answers are still here.</p>
      <div class="row-inline">
        <button class="qr primary" onclick="${backFn}">Try again</button>
      </div>`);
  }

  /* ---------------- Small utilities ---------------- */

  function contribTypeToSchema(type) {
    const map = {
      'PDF / Document': 'PDF',
      'URL / Link': 'URL',
      'GitHub repository': 'GitHub',
      'Protocol': 'Protocol',
      'Audio': 'Audio',
      'Video': 'Video',
      'Image': 'Image',
      'Other': 'Other'
    };
    return map[type] || 'Other';
  }

  function extractUrl(text) {
    if (!text) return '';
    const match = text.match(/https?:\/\/[^\s)>\]]+/);
    return match ? match[0] : '';
  }

  function mapConsentToPrivacy(consent) {
    const map = {
      'Private': 'Private',
      'Anonymous': 'Public - Anonymous',
      'Public': 'Public - Attributed'
    };
    return map[consent] || 'Private';
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  renderOpening();
</script>
</body>
</html>
